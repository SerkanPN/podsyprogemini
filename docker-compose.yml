version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: podsy_user
      POSTGRES_PASSWORD: podsy_password
      POSTGRES_DB: podsy_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podsy_user -d podsy_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://podsy_user:podsy_password@postgres:5432/podsy_db
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  python-workers:
    build:
      context: ./python-workers
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://podsy_user:podsy_password@postgres:5432/podsy_db
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  cron-scheduler:
    build:
      context: ./cron-scheduler
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://podsy_user:podsy_password@postgres:5432/podsy_db
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
